<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>工地材料訂購系統 (優化鍵盤版)</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        body { -webkit-tap-highlight-color: transparent; }
        .page { display: none; }
        .page.active { display: block; }
    </style>
</head>
<body class="bg-gray-100 text-gray-800 font-sans min-h-screen pb-24">

    <header class="bg-blue-600 text-white p-4 sticky top-0 shadow-md flex justify-between items-center z-50">
        <div class="flex gap-1 shrink-0">
            <button id="btnBack" class="hidden text-xs bg-blue-700 px-2.5 py-1.5 rounded-lg active:bg-blue-800">← 返回</button>
            <button id="btnClearOrder" onclick="clearOrderAndHome()" class="hidden text-xs bg-red-500 px-2.5 py-1.5 rounded-lg font-bold active:bg-red-600">🧹 清除並回首頁</button>
        </div>
        <h1 id="appTitle" class="text-base font-bold mx-2 truncate text-center flex-1">選擇工地</h1>
        <div class="flex gap-1 shrink-0">
            <button id="btnManage" onclick="navigateTo('manage')" class="text-xs bg-slate-700 hover:bg-slate-800 px-2.5 py-1.5 rounded-lg font-bold flex items-center gap-1">⚙️ 設定後台</button>
            <button id="btnNavCart" onclick="navigateTo('cart')" class="hidden text-xs bg-amber-500 hover:bg-amber-600 px-2.5 py-1.5 rounded-lg font-bold">🛒 購物車(<span id="cartCount">0</span>)</button>
        </div>
    </header>

    <main class="p-4 max-w-md mx-auto">

        <section id="pageSites" class="page active space-y-4">
            <div id="backupSection" class="bg-amber-50 border border-amber-200 p-3 rounded-xl text-xs space-y-2 shadow-sm">
                <div class="font-bold text-amber-800 flex items-center gap-1">💾 資料匯入 (JSON)</div>
                <div class="flex gap-2">
                    <input type="file" id="importFile" accept=".json" onchange="importJSON(this)" class="hidden">
                    <button onclick="document.getElementById('importFile').click()" class="w-full bg-amber-600 text-white py-1.5 rounded-md font-medium active:bg-amber-700 text-center">
                        📥 匯入 JSON 基礎資料
                    </button>
                </div>
            </div>

            <div class="space-y-2">
                <h3 class="font-bold text-gray-600 px-1 text-sm">請選擇要填單的工地：</h3>
                <div id="listSites" class="space-y-2"></div>
            </div>
        </section>

        <section id="pageCategories" class="page space-y-4">
            <div class="bg-blue-50 p-3 rounded-lg text-sm font-semibold text-blue-800 shadow-inner">
                目前工地：<span id="currentSiteName"></span>
            </div>
            <div class="space-y-2">
                <h3 class="font-bold text-gray-600 px-1 text-sm">請選擇材料大類：</h3>
                <div id="listCategories" class="space-y-2"></div>
            </div>
        </section>

        <section id="pageItems" class="page space-y-4">
            <div class="bg-blue-50 p-3 rounded-lg text-sm text-blue-800 space-y-1 shadow-inner">
                <div><strong>工地：</strong> <span id="currentSiteName2"></span></div>
                <div><strong>分類：</strong> <span id="currentCategoryName"></span></div>
            </div>

            <div class="bg-white p-3 rounded-xl shadow-sm flex items-center gap-2 border border-gray-200">
                <span class="text-gray-400 text-sm">🔍</span>
                <input type="text" id="searchBar" oninput="renderItems()" class="w-full text-sm focus:outline-none" placeholder="搜尋此分類下的品項關鍵字...">
            </div>

            <div class="bg-slate-50 border border-slate-200 p-3 rounded-xl text-xs space-y-2 shadow-sm">
                <div class="font-bold text-slate-700 flex items-center gap-1">➕ 快速新增材料品項 (至當前分類)</div>
                <div class="flex gap-2">
                    <input type="text" id="inputQuickItem" class="flex-1 border rounded-lg px-3 py-1.5 text-xs bg-white focus:outline-none focus:border-blue-500" placeholder="如：40kg 水泥">
                    <button onclick="quickAddItem()" class="bg-blue-600 text-white px-4 py-1.5 rounded-lg font-medium active:bg-blue-700 shrink-0">新增</button>
                </div>
            </div>

            <div class="space-y-2">
                <h3 class="font-bold text-gray-600 px-1 text-sm">品項清單 (請勾選並輸入數量)：</h3>
                <div id="listItems" class="space-y-2"></div>
            </div>

            <button onclick="navigateTo('cart')" class="w-full bg-amber-500 text-white py-3 rounded-xl font-bold text-base shadow-lg active:bg-amber-600 mt-6 block text-center">
                🛒 查看我的材料購物車 (<span id="cartCountBottom">0</span>)
            </button>

            <button onclick="exportJSON()" class="w-full bg-slate-600 text-white py-2.5 rounded-xl font-bold text-xs shadow md active:bg-slate-700 mt-2 block text-center">
                📤 匯出目前全站基礎資料備份 (JSON)
            </button>
        </section>

        <section id="pageCart" class="page space-y-4">
            <div class="bg-amber-50 p-3 rounded-lg text-sm text-amber-900 space-y-1 border border-amber-200 shadow-inner">
                <div><strong>預計送貨工地：</strong> <span id="cartSiteName"></span></div>
                <div class="text-xs text-gray-500">提示：您可以在這裡修改最終數量，或點擊 ❌ 取消該品項。</div>
            </div>

            <div class="space-y-2">
                <h3 class="font-bold text-gray-600 px-1 text-sm">已選材料明細：</h3>
                <div id="listCartItems" class="space-y-2"></div>
            </div>

            <button onclick="copyCartToClipboard()" class="w-full bg-green-600 text-white py-3 rounded-xl font-bold text-base shadow-lg active:bg-green-700 mt-6 block">
                📋 確認並複製純文字訂購單
            </button>
        </section>

        <section id="pageManage" class="page space-y-6">
            <div class="bg-white p-4 rounded-xl shadow-sm border border-gray-200 space-y-3">
                <h3 class="font-bold text-gray-700 border-b pb-1 text-sm flex items-center justify-between">
                    <span>🏢 工地基本資料維護</span>
                </h3>
                <div class="flex gap-2">
                    <input type="text" id="inputNewSite" class="flex-1 border rounded-lg px-3 py-1.5 text-sm focus:outline-none focus:border-blue-500" placeholder="輸入新工地名稱">
                    <button onclick="addSite()" class="bg-green-600 text-white px-3 py-1.5 rounded-lg text-xs font-medium active:bg-green-700">新增</button>
                </div>
                <div id="manageListSites" class="max-h-40 overflow-y-auto space-y-1 bg-gray-50 p-2 rounded-lg text-sm"></div>
            </div>

            <div class="bg-white p-4 rounded-xl shadow-sm border border-gray-200 space-y-3">
                <h3 class="font-bold text-gray-700 border-b pb-1 text-sm flex items-center justify-between">
                    <span>📁 材料分類維護</span>
                </h3>
                <div class="flex gap-2">
                    <input type="text" id="inputNewCategory" class="flex-1 border rounded-lg px-3 py-1.5 text-sm focus:outline-none focus:border-blue-500" placeholder="如：水泥類、五金類">
                    <button onclick="addCategory()" class="bg-green-600 text-white px-3 py-1.5 rounded-lg text-xs font-medium active:bg-green-700">新增</button>
                </div>
                <div id="manageListCategories" class="max-h-40 overflow-y-auto space-y-1 bg-gray-50 p-2 rounded-lg text-sm"></div>
            </div>

            <div class="bg-white p-4 rounded-xl shadow-sm border border-gray-200 space-y-3">
                <h3 class="font-bold text-gray-700 border-b pb-1 text-sm">
                    <span>📦 材料品項維護</span>
                </h3>
                <div class="grid grid-cols-2 gap-2">
                    <select id="selectManageCategory" onchange="renderManageItems()" class="border rounded-lg px-2 py-1.5 text-xs bg-white focus:outline-none focus:border-blue-500">
                    </select>
                    <input type="text" id="inputNewItem" class="border rounded-lg px-3 py-1.5 text-xs focus:outline-none focus:border-blue-500" placeholder="如：40kg 水泥">
                </div>
                <button onclick="addItem()" class="w-full bg-green-600 text-white py-1.5 rounded-lg text-xs font-medium active:bg-green-700">新增品項至上方選定分類</button>
                <div id="manageListItems" class="max-h-48 overflow-y-auto space-y-1 bg-gray-50 p-2 rounded-lg text-sm"></div>
            </div>
        </section>

    </main>

    <script>
        let db = { sites: [], categories: [], items: [] };
        let currentState = { page: 'sites', siteId: null, siteName: '', catId: null, catName: '' };
        let cart = {};

        function updateCartBadge() {
            const count = Object.keys(cart).length;
            document.getElementById('cartCount').innerText = count;
            document.getElementById('cartCountBottom').innerText = count;
        }

        function clearOrderAndHome() {
            if (confirm('確定要「清除目前的訂購清單」並返回首頁嗎？（這不會刪除您的工地與材料基本資料）')) {
                cart = {};
                updateCartBadge();
                if(document.getElementById('searchBar')) document.getElementById('searchBar').value = '';
                navigateTo('sites');
            }
        }

        function importJSON(input) {
            const file = input.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const parsed = JSON.parse(e.target.result);
                    if (parsed.sites && parsed.categories && parsed.items) {
                        db = parsed;
                        alert('🎉 全站基礎資料匯入成功！');
                        initManageCategorySelect(); // 補上匯入後的下拉初始化同步
                        navigateTo('sites');
                    } else { alert('匯入失敗：JSON 結構格式不正確。'); }
                } catch (err) { alert('讀取檔案失敗。'); }
            };
            reader.readAsText(file);
            input.value = '';
        }

        function exportJSON() {
            if (db.sites.length === 0 && db.categories.length === 0 && db.items.length === 0) {
                if(!confirm('目前系統內無任何資料，確定要匯出空白的備份檔嗎？')) return;
            }
            const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(db, null, 2));
            const downloadAnchorLine = document.createElement('a');
            downloadAnchorLine.setAttribute("href", dataStr);
            downloadAnchorLine.setAttribute("download", "construction_master_data.json");
            document.body.appendChild(downloadAnchorLine);
            downloadAnchorLine.click();
            downloadAnchorLine.remove();
        }

        function navigateTo(page) {
            const prevPage = currentState.page;
            currentState.page = page;

            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            
            document.getElementById('btnBack').classList.remove('hidden');
            document.getElementById('btnClearOrder').classList.remove('hidden');
            document.getElementById('btnNavCart').classList.add('hidden');
            document.getElementById('btnManage').classList.add('hidden');

            if (page === 'sites') {
                document.getElementById('pageSites').classList.add('active');
                document.getElementById('appTitle').innerText = '選擇工地';
                document.getElementById('btnBack').classList.add('hidden');
                document.getElementById('btnClearOrder').classList.add('hidden');
                document.getElementById('btnManage').classList.remove('hidden');
                renderSites();
            } else if (page === 'categories') {
                document.getElementById('pageCategories').classList.add('active');
                document.getElementById('appTitle').innerText = '選擇分類';
                document.getElementById('currentSiteName').innerText = currentState.siteName;
                document.getElementById('btnNavCart').classList.remove('hidden');
                renderCategories();
            } else if (page === 'items') {
                document.getElementById('pageItems').classList.add('active');
                document.getElementById('appTitle').innerText = '選擇品項';
                document.getElementById('currentSiteName2').innerText = currentState.siteName;
                document.getElementById('currentCategoryName').innerText = currentState.catName;
                document.getElementById('btnNavCart').classList.remove('hidden');
                document.getElementById('inputQuickItem').value = ''; 
                renderItems();
            } else if (page === 'cart') {
                document.getElementById('pageCart').classList.add('active');
                document.getElementById('appTitle').innerText = '🛒 購物車確認';
                document.getElementById('cartSiteName').innerText = currentState.siteName || '未選擇工地';
                document.getElementById('btnBack').dataset.backTo = prevPage === 'cart' ? 'items' : prevPage;
                renderCart();
            } else if (page === 'manage') {
                document.getElementById('pageManage').classList.add('active');
                document.getElementById('appTitle').innerText = '⚙️ 後台系統設定';
                document.getElementById('btnClearOrder').classList.add('hidden');
                renderManageSites();
                renderManageCategories();
                initManageCategorySelect(); // 內含品項清單渲染
            }
            updateCartBadge();
        }

        document.getElementById('btnBack').addEventListener('click', (e) => {
            if (currentState.page === 'manage') {
                navigateTo('sites');
            }
            else if (currentState.page === 'cart') {
                const target = e.target.dataset.backTo || 'items';
                navigateTo(target === 'sites' ? 'categories' : target);
            }
            else if (currentState.page === 'items') navigateTo('categories');
            else if (currentState.page === 'categories') navigateTo('sites');
        });

        // ================= 前台填單流線邏輯 =================
        function renderSites() {
            const list = document.getElementById('listSites');
            list.innerHTML = db.sites.length === 0 ? '<p class="text-gray-400 text-center py-8 text-sm">目前無資料。<br>請先點擊上方匯入 JSON，<br>或點擊右上角「設定後台」手動建立。</p>' : '';
            db.sites.forEach(site => {
                const div = document.createElement('div');
                div.className = "flex shadow-sm rounded-xl overflow-hidden bg-white items-stretch border border-gray-200 active:border-blue-500";
                div.innerHTML = `
                    <div class="flex-1 p-4 flex justify-between items-center cursor-pointer min-w-0" onclick="currentState.siteId='${site.id}'; currentState.siteName='${site.name}'; navigateTo('categories')">
                        <span class="font-medium truncate mr-2 text-gray-800">${site.name}</span> 
                        <span class="text-blue-500 text-xs shrink-0 font-bold">進入 →</span>
                    </div>
                `;
                list.appendChild(div);
            });
        }

        function renderCategories() {
            const list = document.getElementById('listCategories');
            list.innerHTML = db.categories.length === 0 ? '<p class="text-gray-400 text-center py-6 text-sm">目前無分類，請先至後台新增分類。</p>' : '';
            db.categories.forEach(cat => {
                const div = document.createElement('div');
                div.className = "flex shadow-sm rounded-xl overflow-hidden bg-white items-stretch border border-gray-200 active:border-blue-500";
                div.innerHTML = `
                    <div class="flex-1 p-4 flex justify-between items-center cursor-pointer min-w-0" onclick="currentState.catId='${cat.id}'; currentState.catName='${cat.name}'; navigateTo('items')">
                        <span class="font-medium truncate mr-2 text-gray-800">${cat.name}</span> 
                        <span class="text-blue-500 text-xs shrink-0 font-bold">進入 →</span>
                    </div>
                `;
                list.appendChild(div);
            });
        }

        function handleItemCheck(itemId, checked) {
            if (checked) {
                if (!cart[itemId]) cart[itemId] = { qty: '' };
            } else {
                delete cart[itemId];
            }
            updateCartBadge();
        }

        function handleItemQty(itemId, qty) {
            if (qty.trim() !== '') {
                if (!cart[itemId]) cart[itemId] = { qty: '' };
                cart[itemId].qty = qty;
                const chk = document.getElementById(`chk-${itemId}`);
                if (chk) chk.checked = true;
            } else {
                if (cart[itemId]) cart[itemId].qty = '';
            }
            updateCartBadge();
        }

        function quickAddItem() {
            const catId = currentState.catId;
            const name = document.getElementById('inputQuickItem').value.trim();
            if (!catId) return alert('請先選取材料分類');
            if (!name) return alert('請輸入品項名稱');
            
            const isDuplicate = db.items.some(item => item.catId === catId && item.name.toLowerCase() === name.toLowerCase());
            if (isDuplicate) return alert(`⚠️ 此分類下已有相同的材料品项「${name}」。`);

            db.items.push({ id: Date.now().toString(), catId, name });
            document.getElementById('inputQuickItem').value = '';
            renderItems(); 
        }

        function renderItems() {
            const list = document.getElementById('listItems');
            const keyword = document.getElementById('searchBar').value.toLowerCase().trim();
            const filteredItems = db.items.filter(item => item.catId === currentState.catId && item.name.toLowerCase().includes(keyword));
            
            list.innerHTML = filteredItems.length === 0 ? '<p class="text-gray-400 text-center py-6 text-sm">無符合的材料品項。</p>' : '';
            
            filteredItems.forEach(item => {
                const inCart = !!cart[item.id];
                const qtyValue = inCart ? cart[item.id].qty : '';
                const div = document.createElement('div');
                div.className = "flex shadow-sm rounded-xl bg-white items-center justify-between p-3 gap-2 border border-gray-200";
                div.innerHTML = `
                    <label class="flex items-center gap-3 flex-1 min-w-0 cursor-pointer select-none">
                        <input type="checkbox" id="chk-${item.id}" ${inCart ? 'checked' : ''} onchange="handleItemCheck('${item.id}', this.checked)" class="w-5 h-5 rounded border-gray-300 text-blue-600 focus:ring-blue-500 shrink-0">
                        <span class="font-medium text-sm text-gray-800 break-all whitespace-normal pr-1">${item.name}</span>
                    </label>
                    <div class="shrink-0 flex items-center">
                        <input type="text" inputmode="decimal" value="${qtyValue}" oninput="handleItemQty('${item.id}', this.value)" class="w-24 border rounded-lg px-2 py-1 text-center text-sm focus:outline-none focus:border-blue-500 bg-slate-50 font-semibold" placeholder="數量/單位">
                    </div>
                `;
                list.appendChild(div);
            });
        }

        // ================= 購物車與資料複製邏輯 =================
        function changeCartQty(itemId, qty) {
            if (qty.trim() === '') {
                delete cart[itemId];
                renderCart();
            } else {
                cart[itemId].qty = qty;
            }
            updateCartBadge();
        }

        function removeCartItem(itemId) {
            delete cart[itemId];
            renderCart();
            updateCartBadge();
        }

        function renderCart() {
            const list = document.getElementById('listCartItems');
            const cartKeys = Object.keys(cart);
            
            if (cartKeys.length === 0) {
                list.innerHTML = '<p class="text-gray-400 text-center py-8 text-sm">🛒 購物車空空如也，請先去挑選材料填寫數量。</p>';
                return;
            }
            
            list.innerHTML = '';
            cartKeys.forEach(itemId => {
                const itemObj = db.items.find(i => i.id === itemId);
                if (!itemObj) return;
                const catObj = db.categories.find(c => c.id === itemObj.catId);
                const catName = catObj ? catObj.name : '未分類';
                
                const div = document.createElement('div');
                div.className = "flex shadow-sm rounded-xl overflow-hidden bg-white items-stretch justify-between gap-2 p-3 border border-gray-200";
                div.innerHTML = `
                    <div class="flex-1 min-w-0 flex flex-col justify-center">
                        <span class="text-xs font-bold text-blue-500">[${catName}]</span>
                        <span class="font-medium text-sm text-gray-800 break-all whitespace-normal pr-1">${itemObj.name}</span>
                    </div>
                    <div class="flex items-center shrink-0 gap-2">
                        <input type="text" inputmode="decimal" value="${cart[itemId].qty}" oninput="changeCartQty('${itemId}', this.value)" class="w-24 border rounded-lg px-2 py-1 text-center text-sm focus:border-blue-500 focus:outline-none bg-amber-50 font-bold text-amber-900" placeholder="數量/單位">
                        <button onclick="removeCartItem('${itemId}')" class="text-red-500 hover:bg-red-50 p-2 rounded-lg text-sm">❌</button>
                    </div>
                `;
                list.appendChild(div);
            });
        }

        function copyCartToClipboard() {
            const cartKeys = Object.keys(cart);
            const selectedItems = [];

            cartKeys.forEach(itemId => {
                const itemObj = db.items.find(i => i.id === itemId);
                if (itemObj) {
                    const catObj = db.categories.find(c => c.id === itemObj.catId);
                    selectedItems.push({
                        catName: catObj ? catObj.name : '未分類',
                        itemName: itemObj.name,
                        qty: cart[itemId].qty || '未填數量'
                    });
                }
            });

            if (selectedItems.length === 0) {
                alert('購物車裡沒有材料，無法複製！');
                return;
            }

            const now = new Date();
            const dateStr = `${now.getFullYear()}/${now.getMonth() + 1}/${now.getDate()}`;

            const grouped = {};
            selectedItems.forEach(item => {
                if (!grouped[item.catName]) grouped[item.catName] = [];
                grouped[item.catName].push(`${item.itemName}：${item.qty}`);
            });

            let textOutput = `送貨工地：${currentState.siteName || '未指定'}\n`;
            textOutput += `填單日期：${dateStr}\n`;
            textOutput += `--------------------\n`;

            for (const catName in grouped) {
                textOutput += `【${catName}】\n`;
                textOutput += grouped[catName].join('\n') + `\n\n`;
            }
            textOutput += `--------------------`;

            if (navigator.clipboard && navigator.clipboard.writeText) {
                navigator.clipboard.writeText(textOutput.trim()).then(() => {
                    alert('📋 購物車清單已複製！趕快去 LINE 按下貼上傳送吧！');
                }).catch(() => fallbackCopy(textOutput));
            } else {
                fallbackCopy(textOutput);
            }
        }

        function fallbackCopy(text) {
            const textArea = document.createElement("textarea");
            textArea.value = text.trim();
            textArea.style.position = "fixed"; 
            textArea.style.top = "0";
            textArea.style.left = "0";
            document.body.appendChild(textArea);
            textArea.focus();
            textArea.select();
            try {
                document.execCommand('copy');
                alert('📋 購物車清單已成功複製！');
            } catch (err) {
                alert('手機瀏覽器不支援自動複製，請手動全選複製。');
            }
            document.body.removeChild(textArea);
        }

        // ================== 後台設定頁面維護邏輯 ==================
        function addSite() {
            const name = document.getElementById('inputNewSite').value.trim();
            if (!name) return alert('請輸入工地名稱');
            db.sites.push({ id: Date.now().toString(), name });
            document.getElementById('inputNewSite').value = '';
            renderManageSites();
        }
        function renameSite(id, oldName) {
            const newName = prompt(`請輸入工地「${oldName}」的新名稱：`, oldName);
            if (newName === null) return; 
            const trimmed = newName.trim();
            if (!trimmed) return alert('工地名稱不能為空！');
            
            const site = db.sites.find(s => s.id === id);
            if (site) {
                site.name = trimmed;
                if (currentState.siteId === id) currentState.siteName = trimmed;
                renderManageSites();
            }
        }
        function deleteSite(id, name) {
            if (confirm(`確定要刪除工地「${name}」嗎？`)) {
                db.sites = db.sites.filter(site => site.id !== id);
                if (currentState.siteId === id) { currentState.siteId = null; currentState.siteName = ''; }
                renderManageSites();
            }
        }
        function renderManageSites() {
            const list = document.getElementById('manageListSites');
            list.innerHTML = db.sites.length === 0 ? '<p class="text-gray-400 text-center py-2 text-xs">暫無工地資料。</p>' : '';
            db.sites.forEach(site => {
                const div = document.createElement('div');
                div.className = "flex justify-between items-center bg-white p-2 rounded border border-gray-200 text-xs mb-1 gap-1";
                div.innerHTML = `
                    <span class="font-medium truncate flex-1 pr-1">${site.name}</span>
                    <div class="flex gap-1 shrink-0">
                        <button onclick="renameSite('${site.id}', '${site.name}')" class="text-blue-500 hover:bg-blue-50 p-1 rounded cursor-pointer">✏️ 改名</button>
                        <button onclick="deleteSite('${site.id}', '${site.name}')" class="text-red-500 hover:bg-red-50 p-1 rounded cursor-pointer">🗑️ 刪除</button>
                    </div>
                `;
                list.appendChild(div);
            });
        }

        function addCategory() {
            const name = document.getElementById('inputNewCategory').value.trim();
            if (!name) return alert('請輸入分類名稱');
            db.categories.push({ id: Date.now().toString(), name });
            document.getElementById('inputNewCategory').value = '';
            renderManageCategories();
            initManageCategorySelect();
        }
        function renameCategory(id, oldName) {
            const newName = prompt(`請輸入分類「${oldName}」的新名稱：`, oldName);
            if (newName === null) return;
            const trimmed = newName.trim();
            if (!trimmed) return alert('分類名稱不能為空！');

            const cat = db.categories.find(c => c.id === id);
            if (cat) {
                cat.name = trimmed;
                if (currentState.catId === id) currentState.catName = trimmed;
                renderManageCategories();
                initManageCategorySelect();
            }
        }
        function deleteCategory(id, name) {
            if (confirm(`確定要刪除分類「${name}」嗎？\n⚠️ 注意：此分類底下的所有材料品項也會一併被移除！`)) {
                db.categories = db.categories.filter(cat => cat.id !== id);
                db.items = db.items.filter(item => item.catId !== id);
                if (currentState.catId === id) { currentState.catId = null; currentState.catName = ''; }
                renderManageCategories();
                initManageCategorySelect();
            }
        }
        function renderManageCategories() {
            const list = document.getElementById('manageListCategories');
            list.innerHTML = db.categories.length === 0 ? '<p class="text-gray-400 text-center py-2 text-xs">暫無分類資料。</p>' : '';
            db.categories.forEach(cat => {
                const div = document.createElement('div');
                div.className = "flex justify-between items-center bg-white p-2 rounded border border-gray-200 text-xs mb-1 gap-1";
                div.innerHTML = `
                    <span class="font-medium truncate flex-1 pr-1">${cat.name}</span>
                    <div class="flex gap-1 shrink-0">
                        <button onclick="renameCategory('${cat.id}', '${cat.name}')" class="text-blue-500 hover:bg-blue-50 p-1 rounded cursor-pointer">✏️ 改名</button>
                        <button onclick="deleteCategory('${cat.id}', '${cat.name}')" class="text-red-500 hover:bg-red-50 p-1 rounded cursor-pointer">🗑️ 刪除</button>
                    </div>
                `;
                list.appendChild(div);
            });
        }

        // 核心同步優化區：不論下拉選單如何重建，最後一定要強制呼叫一次 renderManageItems()
        function initManageCategorySelect() {
            const select = document.getElementById('selectManageCategory');
            const currentVal = select.value; 
            select.innerHTML = '';
            if(db.categories.length === 0) {
                select.innerHTML = '<option value="">- 請先新增分類 -</option>';
                renderManageItems(); // 分類為空時，也同步清空底下的品項
                return;
            }
            db.categories.forEach(cat => {
                const opt = document.createElement('option');
                opt.value = cat.id;
                opt.innerText = cat.name;
                select.appendChild(opt);
            });
            if (currentVal && db.categories.some(c => c.id === currentVal)) {
                select.value = currentVal;
            }
            renderManageItems(); // 🌟 關鍵修正：確保選單重建或切換時，事件與列表 100% 刷新綁定
        }

        function addItem() {
            const catId = document.getElementById('selectManageCategory').value;
            const name = document.getElementById('inputNewItem').value.trim();
            if (!catId) return alert('請先建立或選取材料分類');
            if (!name) return alert('請輸入品項名稱');
            
            const isDuplicate = db.items.some(item => item.catId === catId && item.name.toLowerCase() === name.toLowerCase());
            if (isDuplicate) return alert(`⚠️ 此分類下已有相同的材料品項「${name}」。`);

            db.items.push({ id: Date.now().toString(), catId, name });
            document.getElementById('inputNewItem').value = '';
            renderManageItems();
        }
        function renameItem(id, oldName) {
            const newName = prompt(`請輸入材料品項「${oldName}」的新名稱：`, oldName);
            if (newName === null) return;
            const trimmed = newName.trim();
            if (!trimmed) return alert('品項名稱不能為空！');

            const item = db.items.find(i => i.id === id);
            if (item) {
                const isDuplicate = db.items.some(i => i.catId === item.catId && i.id !== id && i.name.toLowerCase() === trimmed.toLowerCase());
                if (isDuplicate) return alert(`⚠️ 此分類下已有相同的材料品項「${trimmed}」。`);

                item.name = trimmed;
                renderManageItems();
            }
        }
        function deleteItem(id, name) {
            if (confirm(`確定要刪除基本材料「${name}」嗎？`)) {
                db.items = db.items.filter(item => item.id !== id);
                delete cart[id]; 
                renderManageItems();
                updateCartBadge();
            }
        }

        function renderManageItems() {
            const list = document.getElementById('manageListItems');
            const targetCatId = document.getElementById('selectManageCategory').value;
            
            if(!targetCatId) {
                list.innerHTML = '<p class="text-gray-400 text-center py-4 text-xs">請選擇上方分類以檢視品項。</p>';
                return;
            }
            
            const filtered = db.items.filter(item => item.catId === targetCatId);
            list.innerHTML = filtered.length === 0 ? '<p class="text-gray-400 text-center py-4 text-xs">此分類下目前沒有材料。請在上方輸入並點擊新增。</p>' : '';
            
            filtered.forEach(item => {
                const div = document.createElement('div');
                div.className = "flex justify-between items-center bg-white p-2 rounded border border-gray-200 text-xs mb-1 gap-1";
                div.innerHTML = `
                    <span class="font-medium truncate flex-1 pr-1">${item.name}</span>
                    <div class="flex gap-1 shrink-0">
                        <button onclick="renameItem('${item.id}', '${item.name}')" class="text-blue-500 hover:bg-blue-50 p-1 rounded cursor-pointer">✏️ 改名</button>
                        <button onclick="deleteItem('${item.id}', '${item.name}')" class="text-red-500 hover:bg-red-50 p-1 rounded cursor-pointer">🗑️ 刪除</button>
                    </div>
                `;
                list.appendChild(div);
            });
        }

        // 初始化啟動
        navigateTo('sites');
    </script>
</body>
</html>
